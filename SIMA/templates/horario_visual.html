{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h2 class="text-center mb-4 fw-bold text-primary">
        📅 Mi Horario Académico
    </h2>

    <div class="table-responsive">

        <table class="table table-bordered text-center shadow-lg">

            <thead class="table-dark">
                <tr>
                    <th style="width:120px;">Hora</th>

                    {% for dia in dias %}
                        <th>{{ dia }}</th>
                    {% endfor %}
                </tr>
            </thead>

            <tbody>

                {% for fila in matriz %}
                <tr>

                    <!-- HORA -->
                    <td class="fw-bold bg-light">
                        {{ fila.hora }}
                    </td>

                    <!-- DÍAS -->
                    {% for celda in fila.dias %}
                        <td style="height: 90px;">

                            {% if celda %}
                                <div class="p-2 rounded text-white shadow"
                                     style="background: linear-gradient(135deg, #0d6efd, #0a58ca);">

                                    <strong>{{ celda.curso }}</strong>
                                    <br>
                                    <small>📍 {{ celda.salon }}</small>

                                </div>
                            {% endif %}

                        </td>
                    {% endfor %}

                </tr>
                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
