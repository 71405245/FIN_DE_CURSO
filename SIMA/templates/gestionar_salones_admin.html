{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">🏢 Gestión de Salones</h2>
        <a href="{% url 'crear_salon_admin' %}" class="btn btn-success fw-bold">➕ Añadir Salón</a>
    </div>

    <div class="card shadow-lg p-3 rounded-4">
        <table class="table table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Número</th>
                    <th>Capacidad</th>
                    <th class="text-center">Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for salon in salones %}
                <tr>
                    <td class="fw-bold">{{ salon.numero }}</td>
                    <td><span class="badge bg-primary">{{ salon.capacidad }} personas</span></td>
                    <td class="text-center">
                        <a href="{% url 'editar_salon_admin' salon.id %}" class="btn btn-warning btn-sm">✏️ Editar</a>
                        <a href="{% url 'eliminar_salon_admin' salon.id %}" class="btn btn-danger btn-sm">🗑️ Eliminar</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-center">No hay salones registrados.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        
        <div class="mt-3">
            <a href="{% url 'dashboard' %}" class="btn btn-secondary">⬅️ Volver al Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
