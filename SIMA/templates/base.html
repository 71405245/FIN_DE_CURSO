<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SIMA{% endblock %}</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            --accent-color: #4facfe;
            --navbar-bg: rgba(30, 60, 114, 0.95);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafd;
            color: #333;
            min-height: 100vh;
        }

        .navbar {
            background: var(--navbar-bg) !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 1rem 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #a5ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-link-logout {
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545 !important;
            font-weight: 600;
            border-radius: 10px;
            padding: 0.5rem 1.25rem !important;
            transition: all 0.3s ease;
        }

        .nav-link-logout:hover {
            background: #dc3545;
            color: white !important;
            transform: translateY(-1px);
        }

        .content-container {
            padding-top: 2rem;
            padding-bottom: 4rem;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Common Premium Card Styles */
        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .btn-premium {
            border-radius: 12px;
            font-weight: 600;
            padding: 0.6rem 1.5rem;
            transition: all 0.3s ease;
        }

        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" href="{% url 'dashboard' %}">
            <i class="fas fa-graduation-cap me-2"></i>SIMA
        </a>
        
        <div class="ms-auto d-flex align-items-center">
            {% if user.is_authenticated %}
                <span class="text-white-50 me-3 d-none d-md-inline">
                    <i class="fas fa-user-circle me-1"></i> {{ user.username }}
                </span>
                <a href="{% url 'logout' %}" class="nav-link-logout">
                    <i class="fas fa-sign-out-alt me-1"></i> Salir
                </a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container content-container">
    {% block content %}
    {% endblock %}
</div>

<!-- Bootstrap Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
